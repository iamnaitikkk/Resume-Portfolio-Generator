<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASSIGNER | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <button class="theme-toggle lamp-toggle" id="theme-toggle" aria-label="Toggle theme" aria-pressed="false">
      <svg class="lamp-icon" id="lamp-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="lampGlow" cx="50%" cy="38%" r="60%">
            <stop offset="0%" stop-color="#fff7cc" stop-opacity="0.95"/>
            <stop offset="55%" stop-color="#ffd84d" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#ffd84d" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle class="lamp-glow" cx="32" cy="24" r="22" fill="url(#lampGlow)"/>
        <path class="lamp-shade" d="M18 26 L46 26 L40 10 L24 10 Z" fill="currentColor"/>
        <circle class="lamp-bulb" cx="32" cy="30" r="7"/>
        <rect class="lamp-pole" x="30" y="30" width="4" height="16" fill="currentColor"/>
        <path class="lamp-base" d="M20 50 H44 L40 56 H24 Z" fill="currentColor"/>
      </svg>
      <span id="theme-label">Dark</span>
    </button>

    <main class="container page-auth">
      <section class="card auth-card reveal is-visible">
        <span class="brand-mark">✦</span>
        <h1>Welcome back</h1>
        <p>Sign in to continue building your resume and portfolio.</p>

        <form id="login-form" class="auth-form">
          <label>
            Email
            <input type="email" id="login-email" placeholder="jane@example.com" required />
          </label>
          <label>
            Password
            <input type="password" id="login-password" placeholder="••••••••" required />
          </label>
          <button type="submit" class="primary-button">Sign In</button>
        </form>

        <p>Don't have an account? <a href="/signup.html">Create one</a></p>
      </section>
    </main>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/theme.js"></script>
  </body>
</html>
