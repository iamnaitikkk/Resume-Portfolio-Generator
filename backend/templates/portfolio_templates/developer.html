<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ name }} | Developer Portfolio</title>
    <style>
      body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .page { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
      .hero { padding: 2rem; background: #ffffff; border-radius: 30px; box-shadow: 0 25px 70px rgba(15,23,42,0.08); }
      .hero h1 { margin: 0; font-size: clamp(2.4rem, 4vw, 3.5rem); }
      .hero p { margin: 1rem 0 0; color: #475569; line-height: 1.8; }
      .contact { display: flex; flex-wrap: wrap; gap: 1rem; color: #64748b; margin-top: 1.5rem; }
      .section { margin-top: 2rem; }
      .section h2 { margin-bottom: 1rem; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.14em; color: #2563eb; }
      .skills { display: flex; flex-wrap: wrap; gap: 0.75rem; }
      .skill-pill { background: #eff6ff; color: #2563eb; border-radius: 999px; padding: 0.65rem 1rem; font-size: 0.95rem; }
      .projects { display: grid; gap: 1.2rem; }
      .project-card { background: #ffffff; padding: 1.25rem; border-radius: 24px; border: 1px solid #e2e8f0; }
      .project-card a { color: #2563eb; }
    </style>
  </head>
  <body>
    <article class="page">
      <section class="hero">
        <h1>{{ name }}</h1>
        <p>{{ role }}</p>
        <div class="contact">
          <span>{{ email }}</span>
          <span>{{ phone }}</span>
          <span>{{ website }}</span>
        </div>
        <p>{{ about }}</p>
      </section>
      <section class="section">
        <h2>Skills</h2>
        <div class="skills">
          {% for skill in skills %}
          <span class="skill-pill">{{ skill }}</span>
          {% endfor %}
        </div>
      </section>
      <section class="section">
        <h2>Projects</h2>
        <div class="projects">
          {% for project in projects %}
          <article class="project-card">
            <h3>{{ project.name }}</h3>
            <p>{{ project.description }}</p>
            {% if project.link %}
            <p><a href="{{ project.link }}" target="_blank">View Project</a></p>
            {% endif %}
          </article>
          {% endfor %}
        </div>
      </section>
    </article>
  </body>
</html>
