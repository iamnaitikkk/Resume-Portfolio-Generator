<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ name }} | Portfolio</title>
    <style>
      body { margin: 0; font-family: Inter, Arial, sans-serif; background: #0b0f19; color: #e2e8f0; }
      .page { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }
      .hero { padding: 2.5rem; background: #131a2b; border-radius: 24px; border: 1px solid #1f2940; }
      .hero h1 { margin: 0; font-size: clamp(2.4rem, 4vw, 3.6rem); color: #ffffff; }
      .hero .role { margin: 0.5rem 0 0; color: #5eead4; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.9rem; }
      .hero p.about { margin: 1.2rem 0 0; color: #94a3b8; line-height: 1.8; }
      .contact { display: flex; flex-wrap: wrap; gap: 1rem; color: #64748b; margin-top: 1.5rem; font-size: 0.9rem; }
      .section { margin-top: 2rem; }
      .section h2 { margin: 0 0 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.18em; color: #5eead4; }
      .skills { display: flex; flex-wrap: wrap; gap: 0.75rem; }
      .skill-pill { background: #131a2b; border: 1px solid #2dd4bf33; color: #5eead4; border-radius: 999px; padding: 0.6rem 1.05rem; font-size: 0.9rem; }
      .projects { display: grid; gap: 1.2rem; }
      .project-card { background: #131a2b; padding: 1.4rem; border-radius: 20px; border: 1px solid #1f2940; }
      .project-card h3 { margin: 0 0 0.4rem; color: #ffffff; }
      .project-card p { color: #94a3b8; margin: 0; }
      .project-card a { color: #5eead4; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <article class="page">
      <section class="hero">
        <h1>{{ name }}</h1>
        <p class="role">{{ role }}</p>
        <div class="contact">
          <span>{{ email }}</span>
          <span>{{ phone }}</span>
          <span>{{ website }}</span>
        </div>
        <p class="about">{{ about }}</p>
      </section>
      <section class="section">
        <h2>Skills</h2>
        <div class="skills">
          {% for skill in skills %}
          <span class="skill-pill">{{ skill }}</span>
          {% endfor %}
        </div>
      </section>
      <section class="section">
        <h2>Projects</h2>
        <div class="projects">
          {% for project in projects %}
          <article class="project-card">
            <h3>{{ project.name }}</h3>
            <p>{{ project.description }}</p>
            {% if project.link %}
            <p><a href="{{ project.link }}" target="_blank">View Project →</a></p>
            {% endif %}
          </article>
          {% endfor %}
        </div>
      </section>
    </article>
  </body>
</html>
