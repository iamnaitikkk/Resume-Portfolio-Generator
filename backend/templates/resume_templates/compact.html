<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ name }} | Resume</title>
    <style>
      @page { size: A4; margin: 14mm; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #1f2933;
        font-size: 9.5pt;
        line-height: 1.4;
      }
      .resume-document {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
      }
      .resume-header {
        display: table;
        width: 100%;
        border-bottom: 1.5px solid #1f2933;
        padding-bottom: 8px;
        margin-bottom: 10px;
      }
      .resume-header .left { display: table-cell; }
      .resume-header .right {
        display: table-cell;
        text-align: right;
        vertical-align: bottom;
        font-size: 8pt;
        color: #52606d;
      }
      .right span { display: block; }
      h1 { margin: 0; font-size: 18pt; }
      .role { margin: 2px 0 0; font-size: 9pt; color: #52606d; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
      .summary { margin: 0 0 10px; font-size: 9pt; color: #334155; }
      h2 {
        margin: 10px 0 4px;
        font-size: 8.5pt;
        font-weight: bold;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #1f2933;
        border-bottom: 1px solid #cbd2d9;
        padding-bottom: 2px;
      }
      ul { margin: 0; padding-left: 14px; }
      li { margin-bottom: 3px; }
      .skills-line { font-size: 9pt; color: #334155; }
      .skills-line span:after { content: " · "; color: #9aa5b1; }
      .skills-line span:last-child:after { content: ""; }
      @media print {
        body { background: #ffffff; }
      }
    </style>
  </head>
  <body>
    <article class="resume-document resume-compact">
      <header class="resume-header">
        <div class="left">
          <h1>{{ name }}</h1>
          <p class="role">{{ title }}</p>
        </div>
        <div class="right">
          <span>{{ email }}</span>
          <span>{{ phone }}</span>
          <span>{{ location }}</span>
        </div>
      </header>

      <p class="summary">{{ summary }}</p>

      <h2>Experience</h2>
      <ul>
        {% for item in experience %}
        <li>{{ item }}</li>
        {% endfor %}
      </ul>

      <h2>Education</h2>
      <ul>
        {% for item in education %}
        <li>{{ item }}</li>
        {% endfor %}
      </ul>

      <h2>Skills</h2>
      <p class="skills-line">
        {% for skill in skills %}
        <span>{{ skill }}</span>
        {% endfor %}
      </p>
    </article>
  </body>
</html>
