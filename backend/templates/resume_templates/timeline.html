<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ name }} | Resume</title>
    <style>
      @page { size: A4; margin: 16mm; }
      body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #f5f7fb;
        color: #1e293b;
        font-size: 11pt;
        line-height: 1.5;
      }
      .resume-document {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px 34px;
      }
      .resume-header {
        padding-bottom: 16px;
        margin-bottom: 18px;
        border-bottom: 3px solid #7c3aed;
      }
      h1 { margin: 0; font-size: 24pt; color: #1e293b; }
      .role { margin: 6px 0 0; color: #7c3aed; font-weight: 700; }
      .contact { margin-top: 10px; font-size: 9pt; color: #64748b; }
      .contact span { margin-right: 14px; }
      .summary { margin: 0 0 22px; color: #334155; }
      h2 {
        margin: 0 0 12px;
        font-size: 10pt;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #7c3aed;
      }
      .section { margin-bottom: 22px; }
      .timeline { position: relative; padding-left: 18px; border-left: 2px solid #e9d5ff; }
      .timeline-item { position: relative; margin-bottom: 12px; padding-left: 6px; }
      .timeline-item::before {
        content: "";
        position: absolute;
        left: -23px;
        top: 5px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7c3aed;
      }
      .skill {
        display: inline-block;
        margin: 0 6px 8px 0;
        padding: 5px 11px;
        background: #f3e8ff;
        color: #6b21a8;
        border-radius: 6px;
        font-size: 9pt;
        font-weight: 600;
      }
      ul { margin: 0; padding-left: 18px; }
      li { margin-bottom: 6px; }
      @media print {
        body { background: #ffffff; }
      }
    </style>
  </head>
  <body>
    <article class="resume-document resume-timeline">
      <header class="resume-header">
        <h1>{{ name }}</h1>
        <p class="role">{{ title }}</p>
        <div class="contact">
          <span>{{ email }}</span>
          <span>{{ phone }}</span>
          <span>{{ location }}</span>
        </div>
      </header>

      <p class="summary">{{ summary }}</p>

      <section class="section">
        <h2>Experience</h2>
        <div class="timeline">
          {% for item in experience %}
          <div class="timeline-item">{{ item }}</div>
          {% endfor %}
        </div>
      </section>

      <section class="section">
        <h2>Education</h2>
        <ul>
          {% for item in education %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </section>

      <section class="section">
        <h2>Skills</h2>
        {% for skill in skills %}
        <span class="skill">{{ skill }}</span>
        {% endfor %}
      </section>
    </article>
  </body>
</html>
