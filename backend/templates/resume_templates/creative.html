<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ name }} | Resume</title>
    <style>
      @page { size: A4; margin: 16mm; }
      body {
        margin: 0;
        font-family: 'Trebuchet MS', Arial, sans-serif;
        background: #fef6ee;
        color: #2e2a26;
        font-size: 11pt;
        line-height: 1.5;
      }
      .resume-document {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 0 0 1px #f3e4d4;
      }
      .resume-header {
        background: linear-gradient(135deg, #ff8a5b 0%, #ff6f91 100%);
        color: #ffffff;
        padding: 28px 32px;
      }
      h1 { margin: 0; font-size: 25pt; }
      .role {
        margin: 6px 0 0;
        font-weight: 600;
        opacity: 0.95;
      }
      .contact {
        margin-top: 12px;
        font-size: 9pt;
        opacity: 0.9;
      }
      .contact span { margin-right: 14px; }
      .body-grid { padding: 26px 32px; }
      .summary {
        margin: 0 0 22px;
        color: #4a4540;
        background: #fff4ec;
        border-left: 4px solid #ff8a5b;
        padding: 12px 16px;
        border-radius: 0 8px 8px 0;
      }
      h2 {
        margin: 0 0 10px;
        font-size: 10pt;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #ff6f91;
      }
      .section { margin-bottom: 22px; }
      ul { margin: 0; padding-left: 18px; }
      li { margin-bottom: 7px; }
      .skill {
        display: inline-block;
        margin: 0 8px 8px 0;
        padding: 6px 12px;
        background: #ffe3d3;
        color: #c2410c;
        border-radius: 999px;
        font-size: 9pt;
        font-weight: 600;
      }
      @media print {
        body { background: #ffffff; }
        .resume-document { box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <article class="resume-document resume-creative">
      <header class="resume-header">
        <h1>{{ name }}</h1>
        <p class="role">{{ title }}</p>
        <div class="contact">
          <span>{{ email }}</span>
          <span>{{ phone }}</span>
          <span>{{ location }}</span>
        </div>
      </header>
      <div class="body-grid">
        <p class="summary">{{ summary }}</p>

        <section class="section">
          <h2>Experience</h2>
          <ul>
            {% for item in experience %}
            <li>{{ item }}</li>
            {% endfor %}
          </ul>
        </section>

        <section class="section">
          <h2>Education</h2>
          <ul>
            {% for item in education %}
            <li>{{ item }}</li>
            {% endfor %}
          </ul>
        </section>

        <section class="section">
          <h2>Skills</h2>
          {% for skill in skills %}
          <span class="skill">{{ skill }}</span>
          {% endfor %}
        </section>
      </div>
    </article>
  </body>
</html>
