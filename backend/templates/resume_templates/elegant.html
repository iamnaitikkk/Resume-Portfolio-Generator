<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ name }} | Resume</title>
    <style>
      @page { size: A4; margin: 20mm; }
      body {
        margin: 0;
        font-family: 'Garamond', Georgia, serif;
        background: #f6f7f3;
        color: #2f3a33;
        font-size: 11.5pt;
        line-height: 1.6;
      }
      .resume-document {
        width: 100%;
        max-width: 740px;
        margin: 0 auto;
        background: #ffffff;
        padding: 40px 44px;
      }
      .resume-header { text-align: center; margin-bottom: 22px; }
      h1 {
        margin: 0;
        font-size: 28pt;
        letter-spacing: 4px;
        font-weight: 400;
        text-transform: uppercase;
      }
      .role {
        margin: 8px 0 0;
        color: #6f8d76;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 9pt;
      }
      .divider {
        width: 60px;
        height: 1px;
        background: #6f8d76;
        margin: 16px auto;
      }
      .contact {
        font-size: 9.5pt;
        color: #6b7a6e;
      }
      .contact span { margin: 0 10px; }
      .summary {
        margin: 22px 0;
        text-align: center;
        color: #3f4a42;
        font-style: italic;
      }
      h2 {
        margin: 0 0 10px;
        font-size: 10pt;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #6f8d76;
        text-align: center;
      }
      .section { margin-bottom: 22px; }
      ul {
        margin: 0;
        padding-left: 0;
        list-style: none;
        text-align: center;
      }
      li { margin-bottom: 8px; }
      .skill {
        display: inline-block;
        margin: 0 10px 8px;
        color: #3f4a42;
        font-style: italic;
      }
      @media print {
        body { background: #ffffff; }
        .resume-document { padding: 0; }
      }
    </style>
  </head>
  <body>
    <article class="resume-document resume-elegant">
      <header class="resume-header">
        <h1>{{ name }}</h1>
        <p class="role">{{ title }}</p>
        <div class="divider"></div>
        <div class="contact">
          <span>{{ email }}</span>
          <span>{{ phone }}</span>
          <span>{{ location }}</span>
        </div>
      </header>

      <p class="summary">{{ summary }}</p>

      <section class="section">
        <h2>Experience</h2>
        <ul>
          {% for item in experience %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </section>

      <section class="section">
        <h2>Education</h2>
        <ul>
          {% for item in education %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </section>

      <section class="section">
        <h2>Skills</h2>
        <div>
          {% for skill in skills %}
          <span class="skill">{{ skill }}</span>
          {% endfor %}
        </div>
      </section>
    </article>
  </body>
</html>
